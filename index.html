<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CORE-OS MATRIX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-brand">
        <div class="brand-icon">GEN</div>
        <span class="brand-title">CORE-OS</span>
      </div>
      <div class="nav-links">
        <a href="index.html" class="nav-link active">Home</a>
        <a href="ai-profiler/index.html" class="nav-link">AI-Profiler</a>
        <a href="contact-us/index.html" class="nav-link">Contact Dev</a>
      </div>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle layout theme">🌙</button>
    </nav>

    <div class="content-viewport">
      <div class="static-container">
        <h2>Welcome to Career Core Matrix</h2>
        <p>An automated diagnostic framework configured to analyze complex vector structures inside unstructured candidate datasets.</p>
        <div style="margin-top: 24px;">
          <a href="ai-profiler/index.html" class="btn btn-primary" style="text-decoration: none; display: inline-block;">Launch AI-Profiler Pipeline</a>
        </div>
      </div>
    </div>

    <script>
      const toggle = document.getElementById('themeToggle');
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      toggle.textContent = savedTheme === 'dark' ? '🌙' : '☀️';

      toggle.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        toggle.textContent = next === 'dark' ? '🌙' : '☀️';
      });
    </script>
  </body>
</html>
